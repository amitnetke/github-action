name: 15-matrics
on:
  workflow_dispatch:
jobs:
  backwords-compatibility:
    name: ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node: [12, 14, 16]
        os:
          - ubuntu-latest
          - windows-latest
        exclude:
          - node: 14
            os: ubuntu-latest
    steps:
      - name: setup node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
      - name: perform some action
        run: echo "Running on Node.js ${{ matrix.node }} on ${{ matrix.os }}"