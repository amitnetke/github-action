name: 16 - Working with environments
run-name: 16 - Working with environments | env - ${{ input.target-env }}

on:
  workflow_dispatch:
    input:
      target-env:
        type: environment
        default: staging

jobs:
  echo:
    runs-on: ubuntu-latest
    environment: ${{ input.target-env }}
    env:
      my-env-value: ${{ vars.MY_ENV_VALUE || 'default value' }}
    steps:
      - name: Echo Vars
        runs: |
          echo "Env Variable: ${{ env.my-env-value }}"